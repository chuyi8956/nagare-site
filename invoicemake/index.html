<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類ジェネレーター | NAGARE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f0f0ed;font-family:'Noto Sans JP',sans-serif}
input:focus,textarea:focus,select:focus{border-color:#1a1a1a!important;background:#fff!important;outline:none}
button:focus{outline:none}
.row-del:hover{background:#fee!important}
input[type=range]{-webkit-appearance:none;height:4px;background:#ddd;border-radius:2px;border:none;padding:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#1a1a1a;cursor:pointer}

/* ── Layout ── */
#app-container{display:flex;height:100vh;overflow:hidden}
#left-panel{width:380px;min-width:360px;background:#f7f6f3;border-right:1px solid #ddd;overflow-y:auto;padding:16px;flex-shrink:0}
#right-panel{flex:1;background:#e8e6e1;overflow-y:auto;display:flex;justify-content:center;padding:24px;align-items:flex-start}
#preview-wrap{box-shadow:0 4px 32px rgba(0,0,0,.18);background:#fff}

/* ── Mobile: stack vertically, preview becomes a modal/tab ── */
@media(max-width:700px){
  #app-container{flex-direction:column;height:auto}
  #left-panel{width:100%;min-width:0;border-right:none;border-bottom:1px solid #ddd;overflow-y:visible;max-height:none}
  #right-panel{display:none;padding:12px}
  #right-panel.show-mobile{display:flex}
  #preview-wrap{transform:scale(0.45);transform-origin:top center;margin-bottom:-140mm}
  #mobile-toggle{display:flex!important}
}
#mobile-toggle{display:none;width:100%;gap:0;margin-bottom:12px;border-radius:7px;overflow:hidden;border:1px solid #ddd}
#mobile-toggle button{flex:1;padding:9px 0;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;background:#f7f6f3;color:#555;transition:all .15s}
#mobile-toggle button.active{background:#1a1a1a;color:#fff;font-weight:700}

/* ── Print ── */
@media print{
  @page { size: A4; margin: 0; }
  body { background: #fff; height: auto; overflow: visible; }
  #app-container { display: block; height: auto; overflow: visible; }
  #left-panel, #mobile-toggle, button { display: none !important; }
  #right-panel { display: block; padding: 0; background: none; height: auto; overflow: visible; }
  #preview-wrap { box-shadow: none; transform: none !important; margin: 0 !important; height: auto; overflow: visible; }
  #invoice-preview { 
    position: static; 
    width: 210mm; 
    padding: 15mm !important; 
    margin: 0 auto; 
    box-shadow: none;
    visibility: visible;
  }
}
</style>
</head>
<body>
<div id="app-container">
  <div id="left-panel">
    <div style="margin-bottom:14px">
      <div style="font-size:15px;font-weight:700;color:#111;letter-spacing:1px">📄 書類ジェネレーター</div>
      <div style="font-size:10px;color:#888;margin-top:2px">請求書・注文書・見積書 など</div>
    </div>
    <div id="mobile-toggle">
      <button id="btn-edit" class="active" onclick="showPanel('edit')">✏️ 編集</button>
      <button id="btn-preview" onclick="showPanel('preview')">👁 プレビュー</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:12px;background:#ece9e4;padding:4px;border-radius:7px" id="tab-bar">
      <button id="tab-basic" onclick="showTab('basic')" style="flex:1;padding:6px 0;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#1a1a1a;color:#fff;font-family:inherit">基本情報</button>
      <button id="tab-items" onclick="showTab('items')" style="flex:1;padding:6px 0;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:400;background:transparent;color:#555;font-family:inherit">明細</button>
      <button id="tab-extra" onclick="showTab('extra')" style="flex:1;padding:6px 0;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:400;background:transparent;color:#555;font-family:inherit">その他</button>
    </div>
    <div id="panel-basic"></div>
    <div id="panel-items" style="display:none"></div>
    <div id="panel-extra" style="display:none"></div>
    <button onclick="doPrint()" style="width:100%;padding:12px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:4px;font-family:inherit">🖨 PDF として保存・印刷</button>
    <div style="font-size:9.5px;color:#888;text-align:center;margin-top:6px">ブラウザの印刷ダイアログから「PDFとして保存」を選択してください</div>
    <button onclick="resetSettings()" style="width:100%;padding:7px;background:transparent;color:#999;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;margin-top:6px;font-family:inherit">🗑 保存済み設定を初期化</button>
  </div>

  <div id="right-panel">
    <div id="preview-wrap">
      <div id="invoice-preview" style="width:210mm;min-height:297mm;background:#fff;font-family:'Noto Serif JP','Hiragino Mincho ProN',serif;font-size:11px;color:#111;padding:14mm 14mm 10mm 14mm;box-sizing:border-box;position:relative"></div>
    </div>
  </div>
</div>

<input id="logo-file" type="file" accept="image/png" style="display:none">
<input id="stamp-file" type="file" accept="image/png" style="display:none">

let clientSearch = "";

// ── Persistence ──
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
    if(s.issuerName) state.issuerName=s.issuerName;
    if(s.issuerZip) state.issuerZip=s.issuerZip;
    if(s.issuerAddress) state.issuerAddress=s.issuerAddress;
    if(s.issuerTel) state.issuerTel=s.issuerTel;
    if(s.issuerEmail) state.issuerEmail=s.issuerEmail;
    if(s.issuerRegNo) state.issuerRegNo=s.issuerRegNo;
    if(s.issuerBank) state.issuerBank=s.issuerBank;
    if(s.logoUrl) state.logoUrl=s.logoUrl;
    if(s.stampUrl) state.stampUrl=s.stampUrl;
    if(s.logoSize) state.logoSize=s.logoSize;
    if(s.stampSize) state.stampSize=s.stampSize;
    if(s.colHeader) state.colHeader=s.colHeader;
    if(s.taxRate!==undefined) state.taxRate=s.taxRate;
  }catch(e){}
  try{
    const cb=localStorage.getItem(CLIENT_KEY);
    if(cb) clientBook=JSON.parse(cb);
  }catch(e){}
}
function saveSettings(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      issuerName:state.issuerName, issuerZip:state.issuerZip,
      issuerAddress:state.issuerAddress, issuerTel:state.issuerTel,
      issuerEmail:state.issuerEmail, issuerRegNo:state.issuerRegNo,
      issuerBank:state.issuerBank,
      logoUrl:state.logoUrl, stampUrl:state.stampUrl,
      logoSize:state.logoSize, stampSize:state.stampSize,
      colHeader:state.colHeader, taxRate:state.taxRate
    }));
  }catch(e){}
}
function saveClientBook(){
  try{ localStorage.setItem(CLIENT_KEY, JSON.stringify(clientBook)); }catch(e){}
}

// ── Compute ──
function getSubtotal(){ return state.rows.reduce((s,r)=>s+r.qty*r.unitPrice,0); }
function getTax(){ return Math.round(getSubtotal()*state.taxRate); }
function getTotal(){ return getSubtotal()+getTax(); }

// ── Mobile panel toggle ──
function showPanel(p){
  document.getElementById('btn-edit').classList.toggle('active', p==='edit');
  document.getElementById('btn-preview').classList.toggle('active', p==='preview');
  document.getElementById('left-panel').querySelector('#tab-bar').style.display = p==='edit'?'flex':'none';
  ['basic','items','extra'].forEach(t=>{ document.getElementById('panel-'+t).style.display='none'; });
  if(p==='edit'){ document.getElementById('panel-'+state.activeTab).style.display=''; document.getElementById('right-panel').classList.remove('show-mobile'); }
  else { document.getElementById('right-panel').classList.add('show-mobile'); }
}

// ── Tabs ──
function showTab(tab){
  state.activeTab=tab;
  ['basic','items','extra'].forEach(t=>{
    document.getElementById('panel-'+t).style.display= t===tab?'':'none';
    const btn=document.getElementById('tab-'+t);
    btn.style.fontWeight= t===tab?'700':'400';
    btn.style.background= t===tab?'#1a1a1a':'transparent';
    btn.style.color= t===tab?'#fff':'#555';
  });
}

// ── Styles helpers ──
const inp="width:100%;padding:6px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:12px;background:#fafafa;box-sizing:border-box;font-family:inherit";
const section="background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:14px;margin-bottom:10px";
function lbl(text){ return `<div style="font-size:11px;color:#555;margin-bottom:3px;font-weight:500">${text}</div>`; }
function field(lbl_text, inp_html){ return `<div style="margin-bottom:7px">${lbl(lbl_text)}${inp_html}</div>`; }

// ── Render ALL ──
function renderAll(){
  document.getElementById('panel-basic').innerHTML = renderBasic();
  document.getElementById('panel-items').innerHTML = renderItems();
  document.getElementById('panel-extra').innerHTML = renderExtra();
  // restore display
  ['basic','items','extra'].forEach(t=>{
    document.getElementById('panel-'+t).style.display = t===state.activeTab?'':'none';
  });
  renderPreview();
}

// ── Helpers ──
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function setDocType(t){ state.docType=t; renderAll(); }
function updateRow(id,field,val){
  const r=state.rows.find(r=>r.id===id);
  if(!r)return;
  r[field]=(field==='qty'||field==='unitPrice')?Number(val)||0:val;
  renderPreview();
  
  // update items subtotal display without full re-render
  const el=document.querySelector('.total-summary');
  if(el) {
    const subtotal=getSubtotal(), tax=getTax(), total=getTotal();
    const taxLbl=TAX_RATES.find(t=>t.value===state.taxRate)?.label||"";
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between"><span>小計</span><span>${fmt(subtotal)}</span></div>
      <div style="display:flex;justify-content:space-between;opacity:.7"><span>消費税 (${taxLbl})</span><span>${fmt(tax)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;margin-top:4px;border-top:1px solid #444;padding-top:4px"><span>合計</span><span>${fmt(total)}</span></div>
    `;
  }
}
function addRow(){
  state.rows.push({id:Date.now()+Math.random(),name:'',qty:1,unit:'人月',unitPrice:0});
  renderAll();
}
function removeRow(id){
  state.rows=state.rows.filter(r=>r.id!==id);
  renderAll();
}
function pickFile(type){
  const el=document.getElementById(type+'-file');
  el.value='';
  el.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    if(!f.name.toLowerCase().endsWith('.png')||f.type!=='image/png'){ alert('PNG形式のファイルのみアップロードできます。'); return; }
    const r=new FileReader();
    r.onload=ev=>{ state[type==='logo'?'logoUrl':'stampUrl']=ev.target.result; saveSettings(); renderAll(); };
    r.readAsDataURL(f);
  };
  el.click();
}
function toggleClientPicker(){ showClientPicker=!showClientPicker; clientSearch=''; renderAll(); }
function loadClient(name,hon){ state.clientName=name; state.clientHonorific=hon; showClientPicker=false; clientSearch=''; renderAll(); }
function deleteClient(name){
  if(!confirm(`「${name}」を削除しますか？`))return;
  clientBook=clientBook.filter(c=>c.name!==name);
  saveClientBook(); renderAll();
}
function saveCurrentClient(){
  if(!state.clientName.trim())return;
  const c={name:state.clientName, honorific:state.clientHonorific};
  const idx=clientBook.findIndex(x=>x.name===state.clientName);
  if(idx>=0){ if(!confirm(`「${state.clientName}」を上書き保存しますか？`))return; clientBook[idx]=c; }
  else clientBook.push(c);
  saveClientBook(); alert(`「${state.clientName}」を保存しました`); renderAll();
}
function doPrint(){ window.print(); }
function resetSettings(){
  if(!confirm('請求元・ロゴ・印章の保存設定を初期化しますか？'))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ── Init ──
loadSettings();
renderAll();
</script>
</body>
</html>
